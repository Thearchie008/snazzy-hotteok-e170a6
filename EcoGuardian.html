<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Eco Guardian</title>
  <style>
/* ============================================================
   style.css — Eco Guardian  (mobile-first)
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg:           #0a1a0f;
  --c-surface:      #0f2415;
  --c-surface2:     #162d1c;
  --c-border:       #2a5a38;
  --c-green-bright: #4aab68;
  --c-green-mid:    #2e7d4f;
  --c-green-dark:   #1a4a2e;
  --c-amber:        #c8a060;
  --c-orange:       #ff6b35;
  --c-red:          #e05050;
  --c-text:         #d4f0dc;
  --c-text-muted:   #7aab8a;
  --c-hp-bg:        #0a2010;
  --safe-top:       env(safe-area-inset-top,    0px);
  --safe-bottom:    env(safe-area-inset-bottom, 0px);
  --radius-sm: 8px; --radius-md: 14px; --radius-lg: 22px;
  --font-display: 'Georgia', serif;
  --font-body:    system-ui, 'Segoe UI', sans-serif;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden; overscroll-behavior: none;
  background: var(--c-bg); color: var(--c-text);
  font-family: var(--font-body); font-size: 15px; line-height: 1.4;
  -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background: var(--c-bg); overflow: hidden;
  visibility: hidden;
  pointer-events: none;
  z-index: 0;
}
.screen.active {
  visibility: visible;
  pointer-events: auto;
  z-index: 1;
}

/* ══════════════════════════════════════════════════════════
   TITLE
══════════════════════════════════════════════════════════ */
#screen-title {
  align-items: center; justify-content: center; position: relative;
  padding: var(--safe-top) 0 var(--safe-bottom);
}
.title-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 70%, #0d3d22 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 30%, #1a5c35 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 20%, #142e1c 0%, transparent 60%);
  animation: titlePulse 6s ease-in-out infinite alternate;
}
@keyframes titlePulse { from { opacity:.7 } to { opacity:1 } }

.title-content {
  position: relative; text-align: center; z-index: 1; padding: 0 32px;
}
.title-leaf-top { font-size: 3rem; margin-bottom: 8px; animation: monsterFloat 3s ease-in-out infinite; }
.game-title {
  font-family: var(--font-display);
  font-size: clamp(3.2rem, 18vw, 5.5rem);
  font-weight: 700; letter-spacing: 0.08em; line-height: 0.9;
  text-shadow: 0 0 30px #4aab6860, 0 4px 20px #000a;
}
.game-title span {
  color: var(--c-green-bright); display: block;
  font-size: 1.15em; letter-spacing: 0.15em;
  text-shadow: 0 0 40px #4aab6899;
}
.title-sub {
  margin-top: 12px; font-size: 0.82rem;
  letter-spacing: 0.3em; text-transform: uppercase; color: var(--c-text-muted);
}
.btn-begin {
  margin-top: 36px; padding: 18px 48px;
  background: var(--c-green-mid); border: 2px solid var(--c-green-bright);
  border-radius: var(--radius-lg); color: var(--c-text);
  font-size: 1.1rem; font-weight: 700; letter-spacing: 0.06em;
  cursor: pointer; min-height: 56px;
  box-shadow: 0 0 30px #4aab6840;
}
.btn-begin:active { background: var(--c-green-bright); }

/* ══════════════════════════════════════════════════════════
   HUB
══════════════════════════════════════════════════════════ */
#screen-hub {
  display: flex; flex-direction: column;
  background: var(--c-bg);
}
.hub-header {
  padding: calc(var(--safe-top) + 16px) 20px 14px;
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center; justify-content: space-between;
}
.hub-title {
  font-family: var(--font-display);
  font-size: 1rem; font-weight: 700; letter-spacing: 0.1em;
  color: var(--c-green-bright);
}
.hub-encounter { font-size: 0.72rem; color: var(--c-text-muted); }

.hub-body {
  flex: 1; display: flex; flex-direction: column;
  gap: 14px; padding: 20px 20px 10px; justify-content: center;
}

.hub-btn {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 20px; border-radius: var(--radius-lg);
  border: 1px solid var(--c-border);
  background: var(--c-surface);
  cursor: pointer; text-align: left;
  transition: transform 0.1s, border-color 0.15s;
  min-height: 80px;
}
.hub-btn:active { transform: scale(0.97); }

.hub-btn-battle  { border-color: #c03030; }
.hub-btn-garden  { border-color: var(--c-green-mid); }
.hub-btn-inventory { border-color: var(--c-amber); }

.hub-btn-battle:active  { background: #1a0808; }
.hub-btn-garden:active  { background: var(--c-green-dark); }
.hub-btn-inventory:active { background: #1a1208; }

.hub-btn-icon  { font-size: 2.2rem; flex-shrink: 0; }
.hub-btn-label { font-size: 1.05rem; font-weight: 700; color: var(--c-text); }
.hub-btn-sub   { font-size: 0.72rem; color: var(--c-text-muted); margin-top: 2px; }

.hub-footer {
  padding: 12px 20px calc(12px + var(--safe-bottom));
  border-top: 1px solid var(--c-border);
  background: var(--c-surface);
  font-size: 0.78rem; color: var(--c-text-muted);
  text-align: center;
}
.hub-footer span { color: var(--c-green-bright); font-weight: 700; }

/* ══════════════════════════════════════════════════════════
   BATTLE
══════════════════════════════════════════════════════════ */
#screen-battle { position: relative; overflow: hidden; background: #0a1e10; }

/* Camera feed fills entire battle screen */
#ar-camera {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
}

/* AR grid overlay */
#ar-bg-overlay {
  position: absolute; inset: 0; z-index: 1;
  background-image:
    linear-gradient(#2a5a3815 1px, transparent 1px),
    linear-gradient(90deg, #2a5a3815 1px, transparent 1px);
  background-size: 36px 36px;
  animation: gridScroll 8s linear infinite;
  pointer-events: none;
}
@keyframes gridScroll { from { transform:translateY(0) } to { transform:translateY(36px) } }

/* Enemy HP top bar */
#hud-top {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; gap: 10px;
  padding: calc(var(--safe-top) + 10px) 12px 10px;
  background: linear-gradient(180deg, #000000bb 0%, transparent 100%);
}
.btn-exit-battle {
  flex-shrink: 0; width: 36px; height: 36px;
  background: #00000060; border: 1px solid #ffffff30;
  border-radius: 50%; color: #fff; font-size: 0.9rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.hud-enemy-block { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
#hud-enemy-name { font-size: 0.82rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#hud-turn-badge {
  flex-shrink: 0; padding: 5px 10px;
  background: var(--c-green-dark); border: 1px solid var(--c-green-bright);
  border-radius: 20px; font-size: 0.6rem; font-weight: 800;
  letter-spacing: 0.12em; color: var(--c-green-bright); white-space: nowrap;
}

/* Monster stage — centered */
#enemy-stage {
  position: absolute; left: 50%; top: 42%;
  transform: translate(-50%, -50%); z-index: 5;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
#enemy-shadow {
  width: 100px; height: 18px;
  background: radial-gradient(ellipse, #00000070, transparent 70%);
  border-radius: 50%;
}
#enemy-model { display: flex; align-items: center; justify-content: center; }
.monster-svg {
  width: clamp(130px, 44vw, 210px); height: auto;
  filter: drop-shadow(0 6px 20px #00000099);
  animation: monsterFloat 3s ease-in-out infinite;
}
@keyframes monsterFloat { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-8px) } }
#enemy-name-tag {
  padding: 3px 14px;
  background: #0f2415cc; border: 1px solid var(--c-border);
  border-radius: 20px; font-size: 0.68rem; letter-spacing: 0.08em;
  color: var(--c-green-bright); backdrop-filter: blur(4px);
}

/* Effects */
#effects-layer { position: absolute; inset: 0; z-index: 6; pointer-events: none; }
.capture-ring {
  position: absolute; top: 42%; left: 50%;
  width: 0; height: 0; border: 3px solid var(--c-green-bright);
  border-radius: 50%; transform: translate(-50%, -50%);
  animation: captureExpand 1.4s ease-out forwards;
}
@keyframes captureExpand { from { width:0;height:0;opacity:.9 } to { width:260px;height:260px;opacity:0 } }
.hit-flash { animation: hitFlash 0.35s ease-out; }
@keyframes hitFlash { 0%,100% { filter:none } 40% { filter:brightness(3) saturate(0) } }

/* Bottom panel */
#battle-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  background: #0a1a0fdd; border-top: 1px solid var(--c-border);
  backdrop-filter: blur(8px);
}
#battle-info-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--c-border);
}
#hud-guardian {
  flex: 1; display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-right: 1px solid var(--c-border); min-width: 0;
}
#guardian-sprite { font-size: 2rem; line-height: 1; }
#guardian-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
#guardian-name { font-size: 0.78rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#guardian-level-tag { font-size: 0.62rem; color: var(--c-amber); }
#battle-log-box { flex: 1; padding: 10px 12px; display: flex; align-items: center; }
#battle-log-text { font-size: 0.72rem; color: var(--c-text-muted); line-height: 1.4; }

#action-bar {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 10px 12px calc(10px + var(--safe-bottom));
}
.btn-action {
  padding: 16px 8px; background: var(--c-surface2);
  border: 1px solid var(--c-border); border-radius: var(--radius-md);
  color: var(--c-text); font-size: 0.88rem; font-weight: 700;
  cursor: pointer; min-height: 54px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-action:active:not(:disabled) { transform: scale(0.95); background: var(--c-green-dark); }
.btn-action:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── HP bars ─────────────────────────────────────────────── */
.hp-bar-wrap { display: flex; align-items: center; gap: 6px; }
.hp-bar-wrap.mini .hp-bar-track { height: 5px; }
.hp-bar-label { font-size: 0.6rem; color: var(--c-text-muted); min-width: 16px; flex-shrink: 0; }
.hp-bar-track { flex: 1; height: 8px; background: var(--c-hp-bg); border-radius: 10px; overflow: hidden; min-width: 50px; }
.hp-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
.hp-bar-fill.enemy    { background: linear-gradient(90deg, #c03030, #e05050); }
.hp-bar-fill.guardian { background: linear-gradient(90deg, var(--c-green-dark), var(--c-green-bright)); }
.hp-bar-wrap > span:last-child { font-size: 0.62rem; color: var(--c-text-muted); min-width: 44px; text-align: right; flex-shrink: 0; }

/* ══════════════════════════════════════════════════════════
   RESULT
══════════════════════════════════════════════════════════ */
#screen-result { align-items: center; justify-content: center; padding: var(--safe-top) 0 var(--safe-bottom); }
#result-content { text-align: center; padding: 30px 24px; width: 100%; max-width: 380px; }
#result-title { font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 20px; }
.result-victory { color: var(--c-green-bright); }
.result-capture { color: #78e08f; }
.result-defeat  { color: var(--c-red); }
.drops-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--c-text-muted); margin-bottom: 8px; }
#result-drops { margin-bottom: 24px; }
.drop-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--c-border); font-size: 0.92rem; }
.drop-icon { font-size: 1.4rem; }
.drop-name { flex: 1; text-align: left; }
.drop-qty  { color: var(--c-amber); font-weight: 700; }
.result-actions { display: flex; flex-direction: column; gap: 10px; }

/* ══════════════════════════════════════════════════════════
   SHARED PANEL STYLES
══════════════════════════════════════════════════════════ */
.panel-screen { flex-direction: column; overflow: hidden; }
.panel-screen .tab-content { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; padding: 14px 16px calc(14px + var(--safe-bottom)); }

.panel-header {
  flex-shrink: 0; display: flex; align-items: center; gap: 14px;
  padding: calc(var(--safe-top) + 14px) 16px 14px;
  border-bottom: 1px solid var(--c-border); background: var(--c-surface);
}
.panel-header h2 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; }

.btn-back {
  background: none; border: 1px solid var(--c-border); border-radius: var(--radius-sm);
  color: var(--c-green-bright); padding: 8px 14px; font-size: 0.82rem;
  cursor: pointer; min-height: 40px; flex-shrink: 0;
}
.btn-back:active { background: var(--c-surface2); }

/* Tabs */
.tab-bar, #guardian-tabs, #garden-tabs, #detail-tabs {
  display: flex; flex-shrink: 0;
  border-bottom: 1px solid var(--c-border); background: var(--c-surface);
}
.tab {
  flex: 1; padding: 13px 6px; background: none; border: none;
  border-bottom: 3px solid transparent; color: var(--c-text-muted);
  font-size: 0.8rem; font-weight: 600; cursor: pointer; min-height: 48px;
}
.tab.active { color: var(--c-green-bright); border-bottom-color: var(--c-green-bright); }

/* ══════════════════════════════════════════════════════════
   GARDEN
══════════════════════════════════════════════════════════ */
.guardian-card {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius-md); padding: 14px; margin-bottom: 12px;
}
.guardian-card.active-guardian { border-color: var(--c-green-bright); box-shadow: 0 0 14px #4aab6830; }

.gc-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.gc-icon { font-size: 2.4rem; flex-shrink: 0; }
.gc-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.gc-name { font-weight: 700; font-size: 0.92rem; }
.gc-species { font-size: 0.68rem; color: var(--c-text-muted); font-style: italic; }
.gc-level { font-size: 0.72rem; color: var(--c-amber); }
.deployed-tag { font-size: 0.65rem; color: var(--c-green-bright); padding: 3px 8px; border: 1px solid var(--c-green-bright); border-radius: 20px; white-space: nowrap; }

.gc-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.btn-sm {
  padding: 8px 12px; border-radius: var(--radius-sm);
  font-size: 0.72rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--c-border); background: var(--c-surface2);
  color: var(--c-text); white-space: nowrap; min-height: 36px;
}
.btn-sm:active:not(:disabled) { background: var(--c-green-dark); }
.btn-sm.disabled, .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-info   { border-color: #7ab8ff; color: #7ab8ff; }
.btn-bio    { border-color: var(--c-green-bright); color: var(--c-green-bright); }
.btn-feed   { border-color: #e6c060; color: #e6c060; }
.btn-deploy { border-color: var(--c-amber); color: var(--c-amber); }
.btn-hatch  { border-color: var(--c-green-bright); color: var(--c-green-bright); }

.seed-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius-md); padding: 14px; margin-bottom: 12px;
}
.seed-icon { font-size: 2rem; flex-shrink: 0; }
.seed-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.seed-name    { font-weight: 600; font-size: 0.88rem; }
.seed-monster { font-size: 0.72rem; color: var(--c-green-bright); }
.seed-cost    { font-size: 0.68rem; color: var(--c-text-muted); }

/* ══════════════════════════════════════════════════════════
   GUARDIAN DETAIL
══════════════════════════════════════════════════════════ */

/* ── Info tab ── */
.detail-hero {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 16px 16px; border-bottom: 1px solid var(--c-border);
}
.detail-big-icon { font-size: 4rem; flex-shrink: 0; }
.detail-hero-text { display: flex; flex-direction: column; gap: 4px; }
.detail-hero-name    { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; }
.detail-hero-species { font-size: 0.75rem; color: var(--c-text-muted); font-style: italic; }
.detail-hero-archetype {
  font-size: 0.62rem; letter-spacing: 0.12em; font-weight: 700;
  color: var(--c-amber); background: #1a1000; padding: 2px 8px;
  border-radius: 10px; border: 1px solid var(--c-amber); align-self: flex-start;
}
.detail-stats-block {
  display: flex; flex-direction: column; gap: 10px;
  padding: 16px; border-bottom: 1px solid var(--c-border);
}
.stat-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.88rem; }
.stat-row span   { color: var(--c-text-muted); }
.stat-row strong { color: var(--c-text); }
.stat-bar-wrap { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; }
.stat-bar-track { width: 100px; height: 6px; background: var(--c-hp-bg); border-radius: 10px; overflow: hidden; }
.stat-bar-fill.hp { height: 100%; background: linear-gradient(90deg, var(--c-green-dark), var(--c-green-bright)); border-radius: 10px; transition: width 0.4s; }

.detail-desc {
  padding: 14px 16px; font-size: 0.82rem; color: var(--c-text-muted);
  line-height: 1.6; border-bottom: 1px solid var(--c-border);
}
.btn-deploy-full {
  display: block; width: calc(100% - 32px); margin: 16px;
  padding: 16px; background: var(--c-surface2);
  border: 1px solid var(--c-amber); border-radius: var(--radius-md);
  color: var(--c-amber); font-size: 0.9rem; font-weight: 700; cursor: pointer; min-height: 52px;
}
.btn-deploy-full.deployed { border-color: var(--c-green-bright); color: var(--c-green-bright); }
.btn-deploy-full:active { background: var(--c-green-dark); }

/* ── Bio tab ── */
.bio-block { padding: 14px 16px; border-bottom: 1px solid var(--c-border); }
.bio-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--c-text-muted); margin-bottom: 6px; }
.bio-value { font-size: 0.85rem; line-height: 1.55; color: var(--c-text); }
.bio-status { color: #ffaa50; font-weight: 600; }
.bio-trivia { color: var(--c-green-bright); font-style: italic; }
.bio-facts { padding-left: 16px; display: flex; flex-direction: column; gap: 8px; }
.bio-facts li { font-size: 0.82rem; line-height: 1.5; color: var(--c-text); }

/* ── Feed tab ── */
.feed-hero { text-align: center; padding: 20px 16px 12px; }
.feed-icon  { font-size: 4rem; }
.feed-level { font-size: 0.82rem; color: var(--c-amber); margin-top: 6px; font-weight: 700; letter-spacing: 0.08em; }

.feed-stat-preview {
  display: flex; align-items: center; justify-content: space-around;
  padding: 14px 20px; border-bottom: 1px solid var(--c-border);
}
.feed-stat { text-align: center; }
.feed-stat span  { display: block; font-size: 0.65rem; color: var(--c-text-muted); margin-bottom: 4px; }
.feed-stat strong{ font-size: 1.1rem; color: var(--c-text); }
.feed-arrow { font-size: 0.8rem; color: var(--c-green-bright); font-weight: 700; }

.feed-cost-box {
  text-align: center; padding: 20px 16px 14px;
  border-bottom: 1px solid var(--c-border);
}
.feed-cost-label  { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--c-text-muted); margin-bottom: 6px; }
.feed-cost-amount { font-size: 1.3rem; font-weight: 700; color: #e6c060; margin-bottom: 4px; }
.feed-cost-have   { font-size: 0.78rem; color: var(--c-text-muted); }

.btn-feed-action {
  display: block; width: calc(100% - 32px); margin: 16px;
  padding: 18px; background: var(--c-green-mid);
  border: 2px solid var(--c-green-bright); border-radius: var(--radius-md);
  color: var(--c-text); font-size: 1rem; font-weight: 700; cursor: pointer; min-height: 56px;
}
.btn-feed-action:active:not(.disabled) { background: var(--c-green-bright); }
.btn-feed-action.disabled, .btn-feed-action:disabled { opacity: 0.4; cursor: not-allowed; background: var(--c-surface2); border-color: var(--c-border); }

/* ══════════════════════════════════════════════════════════
   INVENTORY
══════════════════════════════════════════════════════════ */
.inv-section-label {
  font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--c-text-muted); padding: 8px 0 6px; margin-top: 4px;
}
.item-grid {
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  flex: 1; min-height: 0;
  padding: 14px 16px calc(14px + var(--safe-bottom));
  display: flex; flex-direction: column; gap: 8px;
}
.item-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius-md); padding: 14px;
}
.item-icon    { font-size: 2rem; flex-shrink: 0; }
.item-details { flex: 1; min-width: 0; }
.item-name    { font-weight: 600; font-size: 0.9rem; }
.item-desc    { font-size: 0.72rem; color: var(--c-text-muted); margin-top: 2px; }
.item-qty     { font-size: 1.1rem; font-weight: 700; color: var(--c-amber); flex-shrink: 0; }

/* ══════════════════════════════════════════════════════════
   SHARED BUTTONS
══════════════════════════════════════════════════════════ */
.btn-primary {
  padding: 16px 24px; background: var(--c-green-mid);
  border: 2px solid var(--c-green-bright); border-radius: var(--radius-md);
  color: var(--c-text); font-size: 1rem; font-weight: 700;
  cursor: pointer; min-height: 52px; width: 100%;
}
.btn-primary:active { background: var(--c-green-bright); }
.btn-secondary {
  padding: 14px 24px; background: var(--c-surface2);
  border: 1px solid var(--c-border); border-radius: var(--radius-md);
  color: var(--c-text-muted); font-size: 0.9rem; font-weight: 600;
  cursor: pointer; min-height: 48px; width: 100%;
}
.btn-secondary:active { background: var(--c-surface); }

/* ══════════════════════════════════════════════════════════
   EMPTY + TOAST
══════════════════════════════════════════════════════════ */
.empty-msg {
  color: var(--c-text-muted); font-size: 0.82rem;
  text-align: center; padding: 40px 16px; font-style: italic; line-height: 1.7;
}
#toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: #1a4a2eee; border: 1px solid var(--c-green-bright);
  border-radius: 24px; padding: 11px 22px; font-size: 0.82rem; color: var(--c-text);
  opacity: 0; transition: opacity 0.22s, transform 0.22s;
  pointer-events: none; z-index: 999; max-width: 85vw; text-align: center;
  backdrop-filter: blur(8px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

  <script>
// ============================================================
//  data.js — Static game data
// ============================================================

const DATA = {

  items: {
    water: {
      id: 'water', name: 'Water', icon: '💧',
      description: 'Used to hatch seeds into Guardians.',
      type: 'consumable',
    },
    sunlight: {
      id: 'sunlight', name: 'Sunlight', icon: '☀️',
      description: 'Used to level up your Guardians.',
      type: 'consumable',
    },
    seed_pitcher_knight: {
      id: 'seed_pitcher_knight', name: 'Pitcher Seed', icon: '🌰',
      description: 'A heavy, dark seed from a Pitcher-Knight.',
      type: 'seed',
      monsterId: 'pitcher_knight',
    },
  },

  monsters: {
    pitcher_knight: {
      id: 'pitcher_knight',
      name: 'Pitcher-Knight',
      species: 'Nepenthes rajah',
      archetype: 'tank',
      description: 'An armored, heavy-set plant monster. Its torso is a deep pitcher, and it wears its lid like a helmet. A natural tank.',
      bio: {
        realName: 'Nepenthes (Tropical Pitcher Plant)',
        habitat: 'Tropical rainforests of Southeast Asia, particularly Borneo, Sumatra, and the Philippines.',
        funFacts: [
          'Nepenthes pitchers can hold up to 3.5 litres of digestive fluid — enough to drown small mammals.',
          'They are carnivorous, luring insects and even small vertebrates into their pitcher with sweet nectar along the rim.',
          'Some species form a symbiotic relationship with tree shrews, who eat nectar from the lid while their droppings fertilise the plant.',
          'The digestive enzymes inside the pitcher are so effective they can dissolve an insect within hours.',
          'Nepenthes rajah holds the record for the largest pitcher of any carnivorous plant.',
        ],
        conservationStatus: 'Vulnerable (some species Critically Endangered)',
        trivia: 'The name Nepenthes comes from Greek mythology — a drug of forgetfulness mentioned in Homer\'s Odyssey.',
      },
      baseStats: { hp: 120, attack: 14, defense: 8 },
      dropTable: [
        { itemId: 'water',               rate: 0.80, qty: [1, 3] },
        { itemId: 'sunlight',            rate: 0.50, qty: [1, 2] },
        { itemId: 'seed_pitcher_knight', rate: 0.35, qty: [1, 1] },
      ],
      captureRate: 0.45,
      statScale: { hp: 1.10, attack: 1.08, defense: 1.10 },
      palette: {
        primary: '#4a7c59', secondary: '#2e5c3f',
        armor: '#8b7355', lid: '#5c4a2e',
        pitcher: '#1a4a2e', eyes: '#ff6b35',
      },
    },
  },

  guardianBase: {
    pitcher_knight: {
      name: 'Pitcher-Knight', icon: '🏺',
      baseHp: 60, baseAttack: 8,
      hpPerLevel: 10, attackPerLevel: 3,
    },
  },

  levelUpCost: (level) => Math.ceil(1 + level * 0.8),
  hatchCost: 3,

  captureChance(enemy, currentHp) {
    const hpRatio = currentHp / enemy.maxHp;
    const base    = DATA.monsters[enemy.monsterId].captureRate;
    return Math.min(0.95, base * (1 - hpRatio) * 2.2);
  },
};
// ============================================================
//  state.js — Centralised mutable game state
// ============================================================

const State = (() => {

  const _state = {
    // Inventory: { itemId: count }
    inventory: {
      water: 5,
      sunlight: 3,
    },

    // Seeds waiting to hatch: [ { seedItemId, monsterId } ]
    seeds: [],

    // Active guardians: [ Guardian instance ]
    guardians: [],

    // Currently selected guardian index for battle (null = none)
    activeGuardianIndex: null,

    // Battle state
    battle: null,    // filled by Battle module

    // Encounter counter
    encounterCount: 0,
  };

  return {
    get: () => _state,

    // ── Inventory helpers ──────────────────────────────────
    addItem(itemId, qty = 1) {
      _state.inventory[itemId] = (_state.inventory[itemId] || 0) + qty;
    },

    removeItem(itemId, qty = 1) {
      if (!this.hasItem(itemId, qty)) return false;
      _state.inventory[itemId] -= qty;
      return true;
    },

    hasItem(itemId, qty = 1) {
      return (_state.inventory[itemId] || 0) >= qty;
    },

    itemCount(itemId) {
      return _state.inventory[itemId] || 0;
    },

    // ── Seed helpers ───────────────────────────────────────
    addSeed(seedItemId) {
      const itemDef = DATA.items[seedItemId];
      _state.seeds.push({ seedItemId, monsterId: itemDef.monsterId });
    },

    removeSeed(index) {
      _state.seeds.splice(index, 1);
    },

    // ── Guardian helpers ───────────────────────────────────
    addGuardian(guardian) {
      _state.guardians.push(guardian);
      if (_state.activeGuardianIndex === null) _state.activeGuardianIndex = 0;
    },

    getActiveGuardian() {
      if (_state.activeGuardianIndex === null) return null;
      return _state.guardians[_state.activeGuardianIndex] || null;
    },

    setActiveGuardian(index) {
      if (index >= 0 && index < _state.guardians.length) {
        _state.activeGuardianIndex = index;
      }
    },
  };
})();
// ============================================================
//  monsters.js — Monster instances + 3D-style SVG renderer
// ============================================================

class Monster {
  constructor(monsterId, level = 1) {
    this.monsterId = monsterId;
    this.level = level;
    const def = DATA.monsters[monsterId];

    // Scale stats by level
    const scale = def.statScale;
    this.maxHp     = Math.round(def.baseStats.hp     * Math.pow(scale.hp,     level - 1));
    this.attack    = Math.round(def.baseStats.attack  * Math.pow(scale.attack, level - 1));
    this.defense   = Math.round(def.baseStats.defense * Math.pow(scale.defense,level - 1));
    this.currentHp = this.maxHp;
    this.name      = def.name;
  }

  isAlive() { return this.currentHp > 0; }

  takeDamage(dmg) {
    this.currentHp = Math.max(0, this.currentHp - dmg);
  }

  // Roll drops on defeat
  rollDrops() {
    const drops = [];
    const table = DATA.monsters[this.monsterId].dropTable;
    for (const entry of table) {
      if (Math.random() < entry.rate) {
        const qty = entry.qty[0] + Math.floor(Math.random() * (entry.qty[1] - entry.qty[0] + 1));
        drops.push({ itemId: entry.itemId, qty });
      }
    }
    return drops;
  }

  // Enemy AI: simple attack
  attackTarget(target) {
    const rawDmg = this.attack;
    const def    = target.defense || 0;
    const dmg    = Math.max(1, rawDmg - def + Math.floor(Math.random() * 5) - 2);
    target.currentHp = Math.max(0, target.currentHp - dmg);
    return dmg;
  }
}

// ── SVG Renderer ─────────────────────────────────────────────
const MonsterRenderer = {

  render(monsterId) {
    if (monsterId === 'pitcher_knight') return this._renderPitcherKnight();
    return '<div class="unknown-monster">?</div>';

  _renderPitcherKnight() {

          <stop offset="0%"  stop-color="#a0926a"/>
          <stop offset="100%" stop-color="#5c4a2e"/>

        <!-- Lid (helmet) gradient -->
        <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#7a6040"/>
          <stop offset="100%" stop-color="#3a2c18"/>
        </linearGradient>
        <!-- Glow for eyes -->
        <filter id="eyeGlow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Drop shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
        </filter>
      </defs>

      <!-- ── LEGS ── -->
      <!-- Left leg -->
      <ellipse cx="70" cy="228" rx="18" ry="10" fill="#5c4a2e" opacity="0.6"/>
      <rect x="55" y="200" width="28" height="35" rx="8"
            fill="url(#armorGrad)" filter="url(#shadow)"/>
      <!-- Left leg armor plate -->

      <rect x="117" y="200" width="28" height="35" rx="8"
            fill="url(#armorGrad)" filter="url(#shadow)"/>

      <path d="M62,175 Q100,168 138,175" stroke="#2e7d4f" stroke-width="1.5" fill="none" opacity="0.7"/>
      <path d="M64,190 Q100,183 136,190" stroke="#2e7d4f" stroke-width="1.5" fill="none" opacity="0.5"/>
      <!-- Pitcher mouth rim -->
      <ellipse cx="100" cy="130" rx="42" ry="14"
               fill="#3a6e4e" stroke="#5aab78" stroke-width="2"/>
      <!-- Acidic glow inside mouth -->
      <ellipse cx="100" cy="133" rx="32" ry="8" fill="#1a5c35" opacity="0.8"/>
      <ellipse cx="100" cy="134" rx="20" ry="5" fill="#0d3d22" opacity="0.9"/>
      <!-- Highlight on pitcher body -->
      <path d="M70,140 Q75,175 72,198" stroke="#4aab68" stroke-width="3"
            fill="none" opacity="0.25" stroke-linecap="round"/>

      <!-- ── SHOULDER ARMOR PAULDRONS ── -->
      <!-- Left pauldron -->
      <path d="M45,125 Q30,115 38,100 Q55,90 70,105 Q65,120 55,128 Z"
            fill="url(#armorGrad)" filter="url(#shadow)"/>
      <path d="M46,120 Q34,112 41,102 Q55,95 67,108" stroke="#c8b080"
            stroke-width="1" fill="none" opacity="0.4"/>
      <!-- Right pauldron -->
      <path d="M155,125 Q170,115 162,100 Q145,90 130,105 Q135,120 145,128 Z"
            fill="url(#armorGrad)" filter="url(#shadow)"/>
      <path d="M154,120 Q166,112 159,102 Q145,95 133,108" stroke="#c8b080"
            stroke-width="1" fill="none" opacity="0.4"/>

      <!-- ── ARMS ── -->

      <!-- Left fist/vine fist -->

      <!-- Right fist -->

            fill="url(#lidGrad)" stroke="#8b6a3a" stroke-width="2"/>
      <!-- Lid texture veins -->

            fill="none" opacity="0.35" stroke-linecap="round"/>
      <!-- Lid rim fringe (teeth-like serrations) -->

               L100,103 L106,95 L112,103 L118,95 L124,103 L130,95 L136,103
               L142,95 L146,102"
            stroke="#a07840" stroke-width="1.5" fill="none"/>

      <!-- ── FACE (between helmet and pitcher rim) ── -->
      <!-- Face plate -->
      <ellipse cx="100" cy="118" rx="30" ry="14" fill="#1e3d2a" stroke="#2e5c3f" stroke-width="1.5"/>
      <!-- Eyes -->
      <ellipse cx="88"  cy="116" rx="7" ry="7" fill="#ff6b35" filter="url(#eyeGlow)"/>

// ============================================================
//  guardian.js — Player Guardian (hatched from seed)
// ============================================================

class Guardian {
  constructor(monsterId) {
    const def = DATA.guardianBase[monsterId];
    this.monsterId   = monsterId;
    this.name        = def.name;
    this.icon        = def.icon;
    this.level       = 1;
    this.xp          = 0;

    this.baseHp      = def.baseHp;
    this.baseAttack  = def.baseAttack;
    this.hpPerLevel  = def.hpPerLevel;
    this.attackPerLevel = def.attackPerLevel;

    this._recalcStats();
    this.currentHp = this.maxHp;
    this.defense    = 2;   // flat base
  }

  _recalcStats() {
    this.maxHp  = this.baseHp     + (this.level - 1) * this.hpPerLevel;
    this.attack = this.baseAttack + (this.level - 1) * this.attackPerLevel;
  }

  isAlive() { return this.currentHp > 0; }

  takeDamage(dmg) {
    this.currentHp = Math.max(0, this.currentHp - dmg);
  }

  heal(amount) {
    this.currentHp = Math.min(this.maxHp, this.currentHp + amount);
  }

  healFull() { this.currentHp = this.maxHp; }

  // Returns damage dealt
  attackTarget(target) {
    const rawDmg = this.attack + Math.floor(Math.random() * 5);
    const def    = target.defense || 0;
    const dmg    = Math.max(1, rawDmg - def);
    target.takeDamage(dmg);
    return dmg;
  }

  // ── Levelling ──────────────────────────────────────────────
  canLevelUp() {
    const cost = DATA.levelUpCost(this.level);
    return State.hasItem('sunlight', cost);
  }

  levelUp() {
    const cost = DATA.levelUpCost(this.level);
    if (!State.removeItem('sunlight', cost)) return { success: false, reason: 'Not enough Sunlight.' };

    const prevMaxHp  = this.maxHp;
    const prevAtk    = this.attack;
    this.level++;
    this._recalcStats();
    // Heal proportionally when levelling up
    this.currentHp = Math.min(this.maxHp, this.currentHp + this.hpPerLevel);

    return {
      success: true,
      hpGain:  this.maxHp  - prevMaxHp,
      atkGain: this.attack - prevAtk,
      newLevel: this.level,
    };
  }

  // ── Serialise summary for UI ──────────────────────────────
  summary() {
    return {
      name:      this.name,
      icon:      this.icon,
      level:     this.level,
      currentHp: this.currentHp,
      maxHp:     this.maxHp,
      attack:    this.attack,
      defense:   this.defense,
    };
  }
}

// ── Factory: hatch a seed into a Guardian ─────────────────────
const Hatchery = {
  canHatch(seedIndex) {
    const seed = State.get().seeds[seedIndex];
    if (!seed) return { ok: false, reason: 'No seed.' };
    const cost = DATA.hatchCost;
    if (!State.hasItem('water', cost)) {
      return { ok: false, reason: `Need ${cost} 💧 Water (have ${State.itemCount('water')}).` };
    }
    return { ok: true, seed, cost };
  },

  hatch(seedIndex) {
    const check = this.canHatch(seedIndex);
    if (!check.ok) return check;
    State.removeItem('water', check.cost);
    State.removeSeed(seedIndex);
    const g = new Guardian(check.seed.monsterId);
    State.addGuardian(g);
    return { ok: true, guardian: g };
  },
};
// ============================================================
//  battle.js — Turn-based battle engine
// ============================================================

const Battle = (() => {

  let _enemy      = null;
  let _guardian   = null;
  let _playerTurn = true;
  let _busy       = false;

  // ── Start a new battle ─────────────────────────────────────
  function start(monsterId, level = 1) {
    _enemy      = new Monster(monsterId, level);
    _guardian   = State.getActiveGuardian();
    _playerTurn = true;
    _busy       = false;

    State.get().battle = { enemy: _enemy, active: true };

    _renderEnemy();
    _updateAllHUD();

    if (!_guardian) {
      _log(`A wild ${_enemy.name} appeared! No guardian — fight bare-handed or try to capture!`);
    } else {
      _log(`A wild ${_enemy.name} (Lv ${_enemy.level}) appeared!`);
    }

    _setActionButtons(true);
  }

  // ── Player: Attack ─────────────────────────────────────────
  function playerAttack() {
    if (!_playerTurn || _busy) return;
    _busy = true;

    let dmg;
    if (_guardian) {
      dmg = _guardian.attackTarget(_enemy);
      _log(`${_guardian.name} attacks! ${_enemy.name} takes ${dmg} damage.`);
    } else {
      // Bare-hands "Struggle" — always available, deals fixed low damage
      dmg = Math.max(1, 5 + Math.floor(Math.random() * 6));
      _enemy.takeDamage(dmg);
      _log(`You struggle bare-handed! ${_enemy.name} takes ${dmg} damage.`);
    }

    _playHitEffect('enemy');
    _updateAllHUD();

    if (!_enemy.isAlive()) { _onEnemyDefeated(); return; }

    _playerTurn = false;
    _setActionButtons(false);
    setTimeout(_enemyTurn, 900);
  }

  // ── Player: Capture ────────────────────────────────────────
  function attemptCapture() {
    if (!_playerTurn || _busy) return;
    _busy = true;

    const chance = DATA.captureChance(_enemy, _enemy.currentHp);
    const roll   = Math.random();

    _log(`You throw a seed net! (${Math.round(chance * 100)}% chance…)`);
    _playCaptureEffect();

    setTimeout(() => {
      if (roll < chance) {
        _log(`Gotcha! ${_enemy.name} was captured! Seed added.`);
        const seedId = `seed_${_enemy.monsterId}`;
        State.addSeed(seedId);
        State.addItem(seedId, 1);
        _endBattle('capture');
      } else {
        _log(`${_enemy.name} broke free! It attacks!`);
        _busy = false;
        _playerTurn = false;
        _setActionButtons(false);
        setTimeout(_enemyTurn, 800);
      }
    }, 1200);
  }

  // ── Enemy turn ─────────────────────────────────────────────
  function _enemyTurn() {
    if (!_enemy || !_enemy.isAlive()) return;

    // If no guardian, enemy attacks the player directly (player has a virtual HP pool)
    if (!_guardian) {
      // Player takes damage — reflected as a log message; no HP bar crash
      const dmg = Math.max(1, _enemy.attack - 2 + Math.floor(Math.random() * 4));
      _log(`${_enemy.name} attacks you! You take ${dmg} damage. Weaken it to capture!`);
      _playHitEffect('guardian');
      _playerTurn = true;
      _busy       = false;
      _setActionButtons(true);
      return;
    }

    const dmg = _enemy.attackTarget(_guardian);
    _log(`${_enemy.name} attacks! ${_guardian.name} takes ${dmg} damage.`);
    _playHitEffect('guardian');
    _updateAllHUD();

    if (!_guardian.isAlive()) {
      _log(`${_guardian.name} fainted!`);
      setTimeout(() => _endBattle('defeat'), 800);
      return;
    }

    _playerTurn = true;
    _busy       = false;
    _setActionButtons(true);
  }

  // ── Enemy defeated ─────────────────────────────────────────
  function _onEnemyDefeated() {
    const drops = _enemy.rollDrops();
    for (const d of drops) {
      State.addItem(d.itemId, d.qty);
      if (DATA.items[d.itemId] && DATA.items[d.itemId].type === 'seed') {
        State.addSeed(d.itemId);
      }
    }
    _log(`${_enemy.name} was defeated!`);
    setTimeout(() => _endBattle('victory', drops), 600);
  }

  function _endBattle(outcome, drops = []) {
    State.get().battle = { enemy: _enemy, active: false };
    _setActionButtons(false);
    if (_guardian) _guardian.healFull();
    UI.showResult(outcome, drops, _enemy);
  }

  // ── HUD ────────────────────────────────────────────────────
  function _updateAllHUD() {
    _updateEnemyHUD();
    _updateGuardianHUD();
  }

  function _updateEnemyHUD() {
    if (!_enemy) return;
    const pct = (_enemy.currentHp / _enemy.maxHp) * 100;
    document.getElementById('enemy-hp-bar').style.width = `${pct}%`;
    document.getElementById('enemy-hp-text').textContent = `${_enemy.currentHp}/${_enemy.maxHp}`;
    const tag = document.getElementById('hud-enemy-name');
    if (tag) tag.textContent = `${_enemy.name} Lv${_enemy.level}`;
  }

  function _updateGuardianHUD() {
    const g = _guardian;
    if (!g) {
      document.getElementById('guardian-name').textContent     = 'No Guardian';
      document.getElementById('guardian-hp-text').textContent  = '—';
      document.getElementById('guardian-level-tag').textContent = 'Lv —';
      document.getElementById('guardian-hp-bar').style.width   = '0%';
      document.getElementById('guardian-sprite').textContent   = '🌿';
      return;
    }
    const pct = (g.currentHp / g.maxHp) * 100;
    document.getElementById('guardian-name').textContent      = g.name;
    document.getElementById('guardian-hp-bar').style.width    = `${pct}%`;
    document.getElementById('guardian-hp-text').textContent   = `${g.currentHp}/${g.maxHp}`;
    document.getElementById('guardian-level-tag').textContent = `Lv ${g.level}`;
    document.getElementById('guardian-sprite').textContent    = g.icon;
  }

  function _renderEnemy() {
    const wrap = document.getElementById('enemy-model');
    if (wrap) wrap.innerHTML = MonsterRenderer.render(_enemy.monsterId);
    const tag = document.getElementById('enemy-name-tag');
    if (tag) tag.textContent = `${_enemy.name} · Lv ${_enemy.level}`;
  }

  function _log(msg) {
    const el = document.getElementById('battle-log-text');
    if (el) el.textContent = msg;
  }

  function _setActionButtons(enabled) {
    ['btn-attack', 'btn-capture'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = !enabled;
    });
    const badge = document.getElementById('hud-turn-badge');
    if (badge) badge.textContent = enabled ? 'YOUR TURN' : 'ENEMY TURN';
  }

  function _playHitEffect(target) {
    const el = target === 'enemy'
      ? document.getElementById('enemy-model-wrap')
      : document.getElementById('guardian-sprite-wrap');
    if (!el) return;
    el.classList.add('hit-flash');
    setTimeout(() => el.classList.remove('hit-flash'), 350);
  }

  function _playCaptureEffect() {
    const layer = document.getElementById('effects-layer');
    if (!layer) return;
    const div = document.createElement('div');
    div.className = 'capture-ring';
    layer.appendChild(div);
    setTimeout(() => div.remove(), 1500);
  }

  return {
    start,
    playerAttack,
    attemptCapture,
    refreshGuardian() {
      _guardian = State.getActiveGuardian();
      _updateGuardianHUD();
    },
  };
})();

    toast(`🌟 ${g.name} reached Lv ${result.newLevel}! +${result.hpGain} HP, +${result.atkGain} ATK`);
    Battle.refreshGuardian();
    openGuardianDetail(index, 'feed');
  }

  function deployGuardian(index) {
    State.setActiveGuardian(index);
    Battle.refreshGuardian();
    const g = State.get().guardians[index];
    toast(`${g.name} deployed to battle!`);
    _renderGarden();
    if (document.getElementById('screen-guardian-detail')?.classList.contains('active')) {
      openGuardianDetail(index, 'info');
    }
  }

  // ── Battle result ─────────────────────────────────────────
  function showResult(outcome, drops, enemy) {
    const title   = document.getElementById('result-title');
    const dropsEl = document.getElementById('result-drops');

    title.textContent = outcome === 'victory' ? '🌿 Victory!'
                      : outcome === 'capture' ? '🌱 Captured!'
                      : '💀 Defeated…';
    title.className = outcome === 'victory' ? 'result-victory'
                    : outcome === 'capture' ? 'result-capture'
                    : 'result-defeat';

    dropsEl.innerHTML = '';
    if (drops.length > 0) {
      const h = document.createElement('p');
      h.className = 'drops-label'; h.textContent = 'Drops';
      dropsEl.appendChild(h);
      drops.forEach(d => {
        const def = DATA.items[d.itemId];
        if (!def) return;
        const row = document.createElement('div');
        row.className = 'drop-row';
        row.innerHTML = `<span class="drop-icon">${def.icon}</span><span class="drop-name">${def.name}</span><span class="drop-qty">×${d.qty}</span>`;
        dropsEl.appendChild(row);
      });
    } else {
      dropsEl.innerHTML = '<p class="empty-msg">No drops this time.</p>';
    }

    showScreen('screen-result');
  }

  // ── Toast ─────────────────────────────────────────────────
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  return {
    showScreen,
    openBattle, openGarden, openInventory, closeToHub, exitBattle,
    switchGardenTab,
    hatchSeed, feedGuardian, deployGuardian,
    openGuardianDetail, closeDetail,
    showResult, toast,
  };
})();
// ============================================================
//  game.js — Game orchestrator & camera management
// ============================================================

const Game = (() => {

  let _cameraStream = null;

  function _enemyLevel() {
    return 1 + Math.floor(State.get().encounterCount / 3);
  }

  // ── Title → Hub ───────────────────────────────────────────
  function startGame() {
    UI.showScreen('screen-hub');
  }

  // ── Hub → Battle (starts camera) ─────────────────────────
  function enterBattle() {
    _startCamera().then(() => {
      UI.showScreen('screen-battle');
      _newEncounter();
    });
  }

  // ── Leave battle (stops camera) ──────────────────────────
  function exitBattle() {
    _stopCamera();
    UI.showScreen('screen-hub');
  }

  // ── Cycle to next encounter ───────────────────────────────
  function nextEncounter() {
    State.get().encounterCount++;
    UI.showScreen('screen-battle');
    _newEncounter();
  }

  function _newEncounter() {
    const pool = ['pitcher_knight'];
    const pick = pool[Math.floor(Math.random() * pool.length)];
    Battle.start(pick, _enemyLevel());
  }

  // ── Camera ────────────────────────────────────────────────
  async function _startCamera() {
    _stopCamera();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false,
      });
      _cameraStream = stream;
      const vid = document.getElementById('ar-camera');
      if (vid) {
        vid.srcObject = stream;
        vid.play();
      }
    } catch (e) {
      // Camera denied or unavailable — green BG fallback is already in CSS
      console.warn('Camera unavailable:', e.message);
    }
  }

  function _stopCamera() {
    if (_cameraStream) {
      _cameraStream.getTracks().forEach(t => t.stop());
      _cameraStream = null;
    }
    const vid = document.getElementById('ar-camera');
    if (vid) vid.srcObject = null;
  }

  return { startGame, enterBattle, exitBattle, nextEncounter };
})();

    // Allow detail tab buttons to switch without re-rendering everything
    UI.switchDetailTab = (tab) => {
      document.querySelectorAll('#detail-tabs .tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('#screen-guardian-detail .tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`#detail-tabs [data-tab="${tab}"]`)?.classList.add('active');
      document.getElementById(`detail-tab-${tab}`)?.classList.add('active');
    };
  </script>
